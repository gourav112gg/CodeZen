<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="1280" y2="320" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="640" cy="360" r="240" fill="#818cf8" opacity="0.06" filter="blur(90px)" />
  <circle cx="1000" cy="500" r="140" fill="#ef4444" opacity="0.05" filter="blur(60px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <!-- Active Admin tab button -->
    <rect x="857" y="21" width="55" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="869" y="38" fill="#10b981">Verifier</text>
  </g>

  <!-- Header Info Section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Codezen Admin Mainframe Desk</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Secure configuration center with high-contrast inputs, member level switches, and action logs.</text>

  <!-- ADMIN CREDENTIAL CHALLENGE CARD (Centered) -->
  <rect x="390" y="195" width="500" height="435" rx="16" fill="#020617" stroke="#6366f1" stroke-width="1.5" />
  <rect x="391" y="196" width="498" height="36" rx="15" fill="#0c1524" />
  
  <circle cx="420" cy="214" r="5" fill="#ef4444" />
  <circle cx="435" cy="214" r="5" fill="#f59e0b" />
  <text x="640" y="219" text-anchor="middle" fill="#6366f1" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">SYSTEM_CHALLENGE // SEC_LEVEL_GATE</text>

  <!-- Padlock graphic -->
  <circle cx="640" cy="275" r="22" fill="none" stroke="#6366f1" stroke-width="3" />
  <rect x="622" y="275" width="36" height="26" rx="6" fill="#6366f1" />
  <!-- keyhole -->
  <circle cx="640" cy="285" r="3" fill="#020617" />
  <rect x="639" y="288" width="2" height="6" fill="#020617" />

  <text x="640" y="335" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="800">Verification Challenge Required</text>
  
  <text x="640" y="360" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">
    <tspan x="640" dy="0">Use <tspan fill="#818cf8" font-weight="bold">Gourav</tspan> for Super Admin access, <tspan fill="#34d399" font-weight="bold">gourav</tspan> for Level 1 Admin,</tspan>
    <tspan x="640" dy="18">or <tspan fill="#fbbf24" font-weight="bold">gourav1</tspan> for Member view portal integration.</tspan>
  </text>

  <!-- Input Field mockup -->
  <rect x="440" y="405" width="400" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
  <text x="460" y="431" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3">•••••••••••••</text>

  <!-- Decrypt Solve challenge Button -->
  <rect x="440" y="465" width="400" height="42" rx="10" fill="#6366f1" />
  <text x="640" y="491" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">SOLVE &amp; DECRYPT CHALLENGE</text>

  <!-- Quick Credential Access triggers -->
  <text x="640" y="535" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold">QUICK TEST ACCREDITATIONS</text>
  
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold">
    <!-- Super -->
    <rect x="420" y="555" width="105" height="26" rx="6" fill="#eef2ff" stroke="#818cf8" stroke-width="1" />
    <text x="472.5" y="571" text-anchor="middle" fill="#4f46e5">Gourav (Super)</text>
    
    <!-- Lvl 1 -->
    <rect x="535" y="555" width="105" height="26" rx="6" fill="#ecfdf5" stroke="#34d399" stroke-width="1" />
    <text x="587.5" y="571" text-anchor="middle" fill="#059669">gourav (Lvl1)</text>

    <!-- Mem -->
    <rect x="650" y="555" width="105" height="26" rx="6" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" />
    <text x="702.5" y="571" text-anchor="middle" fill="#d97706">gourav1 (Mem)</text>
  </g>
  
</svg>
