<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="320" y1="0" x2="320" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="150" r="150" fill="#818cf8" opacity="0.07" filter="blur(70px)" />
  <circle cx="1080" cy="500" r="180" fill="#10b981" opacity="0.06" filter="blur(75px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <rect x="365" y="21" width="95" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="380" y="38" fill="#10b981">Home_Page</text>
    
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Header section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Codezen Community Blog ledger</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Read tech updates and programming insights synced by senior student mentors.</text>

  <!-- BLOG CARD 1 -->
  <rect x="80" y="195" width="540" height="200" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="110" y="235" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">ARTICLE_1 // STACK_FOUNDATIONS</text>
  
  <text x="110" y="270" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="bold">Mastering Strict TypeScript Flags</text>
  <text x="110" y="295" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">Why configuring strictPropertyInitialization and noImplicitAny in tsconfig prevents runtime memory crashes.</text>
  
  <!-- Info indicators -->
  <text x="110" y="360" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">🕒 5 min read • By Gourav Garg • June 18, 2026</text>

  <!-- BLOG CARD 2 -->
  <rect x="660" y="195" width="540" height="200" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="690" y="235" fill="#6366f1" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">ARTICLE_2 // ASYNC_NETWORKING</text>
  
  <text x="690" y="270" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="bold">Node.js ES Modules Path Resolution</text>
  <text x="690" y="295" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">Understanding file system path resolution differences between CommonJS globals and native ESM module execution structures.</text>
  
  <!-- Info indicators -->
  <text x="690" y="360" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">🕒 8 min read • By Senior Mentors • June 15, 2026</text>


  <!-- BLOG CARD 3 (Full-Width Accent News Banner) -->
  <rect x="80" y="425" width="1120" height="205" rx="16" fill="#020617" stroke="#10b981" stroke-width="1" />
  <rect x="81" y="426" width="1118" height="34" rx="15" fill="#0c1524" />
  <text x="110" y="448" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">COMMUNITY_BULLETIN // ANNOUNCEMENT_SYNC</text>

  <g transform="translate(110, 485)">
    <circle cx="35" cy="35" r="35" fill="#10b981" opacity="0.1" />
    <!-- Announcement Megaphone Simple icon representation -->
    <path d="M 23,35 L 35,27 L 43,27 L 45,43 L 35,43 Z" fill="#10b981" />
    <path d="M 33,43 L 28,50 L 24,50" stroke="#10b981" stroke-width="2" fill="none" />
    
    <text x="90" y="25" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">First Physical Codezen DevFest Announced!</text>
    <text x="90" y="46" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="14">Secure your physical QR RSVP pass under the Gatherings tab to participate in team building and earn special awards.</text>
    <text x="90" y="65" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">REGISTRATION OPENS JUNE 20 • CRITICAL INT-9</text>
  </g>

</svg>
