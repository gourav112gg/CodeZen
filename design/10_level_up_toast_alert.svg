<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="640" cy="180" r="180" fill="#f59e0b" opacity="0.12" filter="blur(60px)" />
  <circle cx="640" cy="180" r="120" fill="#10b981" opacity="0.08" filter="blur(40px)" />

  <!-- Navigation Bar Mockup under modal -->
  <g opacity="0.3">
    <rect x="0" y="0" width="1280" height="70" fill="#0f172a" />
    <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" />
    <text x="380" y="38" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">Home_Page</text>
  </g>

  <!-- Dark glass screen tint -->
  <rect width="1280" height="720" fill="#020617" opacity="0.6" />

  <!-- CELEBRATION TOAST CONTAINER (Centered Card) -->
  <rect x="390" y="120" width="500" height="380" rx="24" fill="#050b14" stroke="#eab308" stroke-width="2.5" />
  
  <!-- Confetti particle graphics nested in card vector -->
  <g opacity="0.8">
    <!-- Sparks yellow -->
    <path d="M 430,170 L 440,165 L 435,180 Z" fill="#f59e0b" />
    <circle cx="840" cy="190" r="4" fill="#f59e0b" />
    <circle cx="450" cy="420" r="5" fill="#f59e0b" />
    <!-- Sparks green -->
    <rect x="810" y="380" width="6" height="15" fill="#10b981" transform="rotate(30, 810, 380)" />
    <circle cx="480" cy="220" r="3" fill="#10b981" />
    <circle cx="800" cy="160" r="6" fill="#10b981" />
    <!-- Sparks purple -->
    <path d="M 640,105 L 643,120 L 637,120 Z" fill="#a855f7" />
    <rect x="420" y="330" width="8" height="8" fill="#a855f7" />
    <rect x="850" y="310" width="6" height="12" fill="#3b82f6" transform="rotate(45, 850, 310)" />
  </g>

  <!-- Big Glowing Star Icon Badge -->
  <!-- Outer aura -->
  <circle cx="640" cy="210" r="48" fill="#eab308" opacity="0.15" />
  <circle cx="640" cy="210" r="38" fill="none" stroke="#eab308" stroke-width="2" />
  <!-- Star path representation -->
  <path d="M 640,185 L 646,201 L 663,201 L 649,211 L 654,228 L 640,218 L 626,228 L 631,211 L 617,201 L 634,201 Z" fill="#eab308" />

  <!-- Toast Content text -->
  <text x="640" y="295" text-anchor="middle" fill="#eab308" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold" letter-spacing="2">PROMOTION AWARD // MILESTONE_REACHED</text>
  
  <text x="640" y="335" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="28" font-weight="950" letter-spacing="-0.5">LEVEL UP COMPLETED!</text>
  
  <text x="640" y="365" text-anchor="middle" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="14" font-weight="500">
    Hacker <tspan fill="#10b981" font-weight="bold">Garg Gourav</tspan> promoted to <tspan fill="#eab308" font-weight="800">LEVEL 2</tspan>
  </text>
  
  <text x="640" y="390" text-anchor="middle" fill="#64748b" font-family="'Inter', sans-serif" font-size="12">
    Earned +500 cumulative reputation points for solving core strict assignments.
  </text>

  <!-- Divider dynamic -->
  <line x1="430" y1="420" x2="850" y2="420" stroke="#334155" stroke-dasharray="4 4" />

  <!-- Claim CTA button -->
  <rect x="430" y="440" width="420" height="42" rx="12" fill="#eab308" />
  <text x="640" y="466" text-anchor="middle" fill="#020617" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">COLLECT LEVEL REWARDS &amp; SYNCHRONIZE</text>

</svg>
