<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="100" cy="100" r="120" fill="#10b981" opacity="0.06" filter="blur(60px)" />
  <circle cx="1100" cy="600" r="160" fill="#6366f1" opacity="0.07" filter="blur(70px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <!-- Active Dashboard button -->
    <rect x="775" y="21" width="90" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="790" y="38" fill="#10b981">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Title section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Member Credentials Mainframe</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Cryptographically signed credentials and peer reputation tracking dashboard.</text>

  <!-- LEFT PANEL: CUSTOM PROFILE CARD -->
  <rect x="80" y="195" width="360" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Custom Pixel Avatar Graphic -->
  <rect x="200" y="230" width="80" height="80" fill="#1e293b" rx="12" stroke="#10b981" stroke-width="1.5" />
  <!-- Pixel portrait representation inside grid -->
  <rect x="215" y="245" width="50" height="50" fill="#10b981" opacity="0.3" />
  <rect x="225" y="250" width="8" height="8" fill="#ffffff" />
  <rect x="245" y="250" width="8" height="8" fill="#ffffff" />
  <rect x="230" y="270" width="20" height="8" fill="#10b981" />

  <text x="240" y="340" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="bold">Garg Gourav</text>
  <text x="240" y="360" text-anchor="middle" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">Junior Software Engineer</text>
  
  <text x="240" y="390" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" width="280">Passionate stack explorer seeking elegant AI practice and git credentials workflow.</text>

  <!-- Tech tags inside card list -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold">
    <rect x="110" y="420" width="75" height="20" rx="4" fill="#1e293b" />
    <text x="120" y="434" fill="#cbd5e1">TypeScript</text>

    <rect x="195" y="420" width="55" height="20" rx="4" fill="#1e293b" />
    <text x="205" y="434" fill="#cbd5e1">React</text>

    <rect x="260" y="420" width="60" height="20" rx="4" fill="#1e293b" />
    <text x="270" y="434" fill="#cbd5e1">Node.js</text>

    <rect x="330" y="420" width="60" height="20" rx="4" fill="#1e293b" />
    <text x="340" y="434" fill="#cbd5e1">Tailwind</text>
  </g>

  <!-- Sign out button strictly at the bottom as specified -->
  <rect x="110" y="565" width="300" height="34" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1" />
  <text x="260" y="586" text-anchor="middle" fill="#fca5a5" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">TERMINATE_SESSION (Sign Out)</text>

  <!-- RIGHT COLUMN: THREE BIG GRAPH CARDS (Level, Commits, Rankings) -->
  
  <!-- Card 1: Experience -->
  <rect x="465" y="195" width="230" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="495" y="240" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">DEVELOPER EXPERIENCE</text>
  <text x="495" y="285" fill="#ffffff" font-family="'Inter', sans-serif" font-size="36" font-weight="900">Level 1</text>
  
  <!-- Interactive Progress bar -->
  <rect x="495" y="480" width="170" height="8" rx="4" fill="#1e293b" />
  <rect x="495" y="480" width="60" height="8" rx="4" fill="#10b981" />
  <text x="495" y="465" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">180 / 500 XP</text>

  <!-- Card 2: Commits -->
  <rect x="715" y="195" width="230" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="745" y="240" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">VERIFIED COMMITS</text>
  <text x="745" y="285" fill="#ffffff" font-family="'Inter', sans-serif" font-size="44" font-weight="900">47</text>
  
  <!-- Graphics: commit wave visualizer chart -->
  <path d="M 745,460 Q 770,410 795,440 T 845,390 T 895,470 L 895,500 L 745,500 Z" fill="#6366f1" opacity="0.15" />
  <path d="M 745,460 Q 770,410 795,440 T 845,390 T 895,470" fill="none" stroke="#6366f1" stroke-width="3" />

  <!-- Card 3: Ranking -->
  <rect x="965" y="195" width="235" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="995" y="240" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">COMMUNITY RANKING</text>
  <text x="995" y="285" fill="#10b981" font-family="'Inter', sans-serif" font-size="44" font-weight="900">#14</text>
  
  <text x="995" y="465" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12">Top 3.1% out of 450+ campus developers listed in synchronization ledger.</text>

</svg>
