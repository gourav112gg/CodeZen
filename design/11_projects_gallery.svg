<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="950" cy="200" r="160" fill="#06b6d4" opacity="0.07" filter="blur(70px)" />
  <circle cx="200" cy="500" r="140" fill="#10b981" opacity="0.06" filter="blur(60px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <!-- Active Dashboard button -->
    <rect x="775" y="21" width="90" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="790" y="38" fill="#10b981">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Title section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Student Projects Exhibition</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Discover and upvote production-ready software prototypes launched by local campus creators.</text>

  <!-- PROJECTS CARDS BENTO MATRIX (3 column columns) -->

  <!-- CARD 1 -->
  <rect x="80" y="195" width="350" height="220" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="110" y="238" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Codezen Sandbox IDE</text>
  <text x="110" y="260" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">An in-browser code editor compiling client-side React and TS bundles instantly via workers.</text>
  
  <text x="110" y="325" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">AUTHOR: @garg_gourav</text>
  
  <!-- Tags nested -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">
    <rect x="110" y="340" width="55" height="18" rx="4" fill="#1e293b" />
    <text x="118" y="352" fill="#cbd5e1">React_18</text>
    <rect x="172" y="340" width="70" height="18" rx="4" fill="#1e293b" />
    <text x="180" y="352" fill="#cbd5e1">WebWorkers</text>
  </g>

  <!-- Interactive Upvote metrics inside cards -->
  <rect x="110" y="375" width="80" height="26" rx="6" fill="#10b981" opacity="0.15" />
  <text x="150" y="392" text-anchor="middle" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">▲ 48</text>

  <!-- CARD 2 -->
  <rect x="465" y="195" width="350" height="220" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="495" y="238" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Crypt Roster Ledger</text>
  <text x="495" y="260" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Cryptographically signed access keys verifying ticket scans for local developer workshops.</text>
  <text x="495" y="325" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">AUTHOR: @abhishek_dev</text>
  
  <!-- Tags nested -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">
    <rect x="495" y="340" width="60" height="18" rx="4" fill="#1e293b" />
    <text x="503" y="352" fill="#cbd5e1">WebCrypto</text>
    <rect x="562" y="340" width="55" height="18" rx="4" fill="#1e293b" />
    <text x="570" y="352" fill="#cbd5e1">QR_Codes</text>
  </g>

  <!-- Interactive Upvote metrics inside cards -->
  <rect x="495" y="375" width="80" height="26" rx="6" fill="#3b82f6" opacity="0.15" />
  <text x="535" y="392" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">▲ 32</text>

  <!-- CARD 3 -->
  <rect x="850" y="195" width="350" height="220" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="880" y="238" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Campus Event Syncer</text>
  <text x="880" y="260" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Web calendar and RSS syncer delivering workshop timetables right inside discord channels.</text>
  <text x="880" y="325" fill="#a855f7" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">AUTHOR: @gourav_admin</text>
  
  <!-- Tags nested -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">
    <rect x="880" y="340" width="65" height="18" rx="4" fill="#1e293b" />
    <text x="888" y="352" fill="#cbd5e1">Discord_API</text>
    <rect x="952" y="340" width="45" height="18" rx="4" fill="#1e293b" />
    <text x="960" y="352" fill="#cbd5e1">NodeJS</text>
  </g>

  <rect x="880" y="375" width="80" height="26" rx="6" fill="#a855f7" opacity="0.15" />
  <text x="920" y="392" text-anchor="middle" fill="#a855f7" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">▲ 24</text>

  <!-- Submit project card link CTA -->
  <rect x="80" y="445" width="1120" height="185" rx="16" fill="#020617" stroke="#10b981" stroke-width="1" stroke-dasharray="8 8" />
  <text x="640" y="525" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Add Your Project to Codezen Mainframe</text>
  <text x="640" y="550" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">Have you built something cool? Register your repository and share your craft with the campus syndicate.</text>

  <rect x="540" y="575" width="200" height="34" rx="8" fill="#10b981" />
  <text x="640" y="596" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">SUBMIT_PROJECT_MANIFEST</text>

</svg>
