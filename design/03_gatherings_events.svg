<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="150" cy="150" r="140" fill="#a855f7" opacity="0.06" filter="blur(60px)" />
  <circle cx="1100" cy="350" r="180" fill="#10b981" opacity="0.07" filter="blur(70px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <!-- Active Gatherings button -->
    <rect x="585" y="21" width="95" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="600" y="38" fill="#10b981">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Header Intro Section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Community Gatherings &amp; Sprints</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Collaborate, hack, and share knowledge at our physical micro-meetups and workshops.</text>

  <!-- Two Column Layout: Left Column = Event Cards List, Right Column = Interactive Event Registrations / RSVP status -->
  
  <!-- LEFT COLUMN CARD 1 -->
  <rect x="80" y="195" width="670" height="135" rx="16" fill="#020617" stroke="#10b981" stroke-width="1.5" />
  <text x="110" y="235" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">AI Core Hack &amp; Build Sprint</text>
  <text x="110" y="258" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">Fireside crash course building server-side LLM orchestrators with direct verification.</text>
  <text x="110" y="295" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">📆 JUNE 20, 2026 // 18:00 Local • 📍 Main Lab H-102</text>
  <!-- Selected RSVP Ticket Tag -->
  <rect x="540" y="210" width="180" height="30" rx="8" fill="#10b981" opacity="0.15" />
  <text x="555" y="229" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">ACTIVE_RSVP_TICKET</text>

  <!-- LEFT COLUMN CARD 2 -->
  <rect x="80" y="345" width="670" height="135" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="110" y="385" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Advanced React Sync Patterns</text>
  <text x="110" y="408" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">Interactive study session explaining race conditions, local caches, and modular render cycles.</text>
  <text x="110" y="445" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">📆 JUNE 27, 2026 // 15:30 Local • 📍 Conference Hall B</text>
  <rect x="630" y="360" width="90" height="26" rx="6" fill="#1e293b" />
  <text x="645" y="377" fill="#cbd5e1" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">Join_Club</text>

  <!-- LEFT COLUMN CARD 3 -->
  <rect x="80" y="495" width="670" height="135" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <text x="110" y="535" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Git Merging &amp; Rebasing Mastery</text>
  <text x="110" y="558" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">Interactive terminal drills to clean up git histories and master advanced collaborative branches.</text>
  <text x="110" y="595" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500">📆 JULY 04, 2026 // 10:00 Local • 📍 Terminal Wing D</text>
  <rect x="630" y="510" width="90" height="26" rx="6" fill="#1e293b" />
  <text x="645" y="527" fill="#cbd5e1" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">Join_Club</text>


  <!-- RIGHT COLUMN: Interactive Pass Reservation Panel -->
  <rect x="780" y="195" width="420" height="435" rx="16" fill="#020617" stroke="#10b981" stroke-width="1.5" />
  
  <!-- Pass Header -->
  <path d="M 780,211 A 16,16 0 0,1 796,195 L 1184,195 A 16,16 0 0,1 1200,211 L 1200,250 L 780,250 Z" fill="#064e3b" />
  <text x="810" y="228" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">EVENT_PASS_DECK // SECURED SEC-99</text>
  
  <!-- RSVP Ticket Card -->
  <!-- Simulated punching holes in typical dev event ticket styling -->
  <circle cx="780" cy="380" r="10" fill="#0b1329" />
  <circle cx="1200" cy="380" r="10" fill="#0b1329" />
  <line x1="795" y1="380" x2="1185" y2="380" stroke="#1e293b" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="810" y="285" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="800">AI Core Hack &amp; Build Sprint</text>
  <text x="810" y="305" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">TICKET_ID: CZ-HACK-AI-20</text>

  <text x="810" y="340" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">HACKER CODE DETAILS</text>
  <text x="810" y="360" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">Garg Gourav (Junior Software Engineer)</text>

  <!-- Simulated QR Code placeholder inside vector design -->
  <rect x="915" y="410" width="150" height="150" rx="8" fill="#ffffff" />
  <!-- QR Pattern Blocks -->
  <g fill="#020617">
    <!-- Finder patterns -->
    <rect x="925" y="420" width="40" height="40" />
    <rect x="933" y="428" width="24" height="24" fill="#ffffff" />
    <rect x="939" y="434" width="12" height="12" />

    <rect x="1015" y="420" width="40" height="40" />
    <rect x="1023" y="428" width="24" height="24" fill="#ffffff" />
    <rect x="1029" y="434" width="12" height="12" />

    <rect x="925" y="510" width="40" height="40" />
    <rect x="933" y="518" width="24" height="24" fill="#ffffff" />
    <rect x="939" y="524" width="12" height="12" />

    <!-- Random dots -->
    <rect x="980" y="425" width="12" height="12" />
    <rect x="995" y="420" width="12" height="8" />
    <rect x="975" y="445" width="8" height="24" />
    <rect x="995" y="445" width="12" height="12" />
    <rect x="1015" y="475" width="20" height="12" />
    <rect x="985" y="480" width="12" height="25" />
    <rect x="1040" y="515" width="15" height="15" />
    <rect x="1010" y="530" width="20" height="10" />
    <rect x="980" y="520" width="15" height="15" />
  </g>

  <!-- Pass Verifier Note -->
  <text x="990" y="595" text-anchor="middle" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">PROOF_CHALLENGE APPROVED BY VERIFIER_SYSTEM</text>
  
</svg>
