<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="900" cy="150" r="150" fill="#0ea5e9" opacity="0.07" filter="blur(65px)" />
  <circle cx="350" cy="500" r="220" fill="#10b981" opacity="0.06" filter="blur(80px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <!-- Active Verifier button -->
    <rect x="675" y="21" width="90" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="690" y="38" fill="#10b981">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Header Info Section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Cryptographic Credential Verifier</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Scan physical member QR tickets automatically to check in and authenticate developer credentials.</text>

  <!-- Verifier Container Block -->
  <!-- Left Side: Interactive Scanner Mockup Device -->
  <rect x="80" y="195" width="520" height="435" rx="16" fill="#020617" stroke="#10b981" stroke-width="1.5" />
  <rect x="81" y="196" width="518" height="36" rx="15" fill="#0c1524" />
  <text x="100" y="218" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">SCANNER_PREVIEW // CAMERA_ACTIVE</text>
  
  <rect x="110" y="255" width="460" height="260" rx="12" fill="#050b14" stroke="#10b981" stroke-width="1" opacity="0.6" />
  
  <!-- Tech Targets in scanning box -->
  <!-- Upper Left corner bracket -->
  <path d="M 130,295 L 130,275 L 150,275" stroke="#10b981" stroke-width="3" fill="none" />
  <!-- Upper Right corner bracket -->
  <path d="M 550,295 L 550,275 L 530,275" stroke="#10b981" stroke-width="3" fill="none" />
  <!-- Lower Left corner bracket -->
  <path d="M 130,475 L 130,495 L 150,495" stroke="#10b981" stroke-width="3" fill="none" />
  <!-- Lower Right corner bracket -->
  <path d="M 550,475 L 550,495 L 530,495" stroke="#10b981" stroke-width="3" fill="none" />

  <!-- Scanning laser transition bar -->
  <line x1="140" y1="385" x2="540" y2="385" stroke="#ef4444" stroke-width="3" opacity="0.8">
    <animate attributeName="y1" values="290;480;290" dur="4s" repeatCount="indefinite" />
    <animate attributeName="y2" values="290;480;290" dur="4s" repeatCount="indefinite" />
  </line>

  <!-- Simulator input forms -->
  <text x="110" y="555" fill="#e2e8f0" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Manual ID Overrides:</text>
  <rect x="250" y="538" width="200" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="265" y="558" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">CZ-HACK-AI-20</text>
  
  <rect x="460" y="538" width="110" height="32" rx="8" fill="#10b981" />
  <text x="515" y="558" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">VERIFY</text>

  <!-- Right Side: Live Logs Terminal Feed -->
  <rect x="630" y="195" width="570" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <rect x="631" y="196" width="568" height="36" rx="15" fill="#0c1524" />
  <text x="655" y="218" fill="#6366f1" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">VERIFICATION_HISTORIC_LEDGER</text>
  
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500">
    <!-- Log 1 Success -->
    <rect x="650" y="250" width="530" height="70" rx="8" fill="#064e3b" opacity="0.2" />
    <text x="665" y="275" fill="#10b981">● CHECK_IN_APPROVED</text>
    <text x="665" y="295" fill="#ffffff">Gourav Garg (Admin Lvl 1) verified for AI Build Sprint.</text>
    <text x="665" y="310" fill="#64748b">Timestamp: 2026-06-18 11:32:01 Local • Crypt: CZ-ADM-GL-01</text>

    <!-- Log 2 Success -->
    <rect x="650" y="335" width="530" height="70" rx="8" fill="#064e3b" opacity="0.1" />
    <text x="665" y="360" fill="#34d399">● VERIFICATION_REGISTERED</text>
    <text x="665" y="380" fill="#cbd5e1">Member: Abhishek - verified for Git Rebasing Event.</text>
    <text x="665" y="400" fill="#64748b">Timestamp: 2026-06-18 09:14:48 Local • Crypt: CZ-MEM-AB-22</text>

    <!-- Log 3 Rejected Action -->
    <rect x="650" y="420" width="530" height="70" rx="8" fill="#7f1d1d" opacity="0.15" />
    <text x="665" y="445" fill="#ef4444">▲ REJECTED_ACCESS // PREVENT_ATTACK</text>
    <text x="665" y="465" fill="#fca5a5">Mismatched Cryptographic Signature. Signature rejected.</text>
    <text x="665" y="485" fill="#ef4444">Timestamp: 2026-06-17 19:44:03 Local • Origin: OUTSIDE_INTEGRITY</text>
  </g>
</svg>
