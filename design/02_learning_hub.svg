<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="800" cy="150" r="150" fill="#3b82f6" opacity="0.07" filter="blur(65px)" />
  <circle cx="200" cy="550" r="200" fill="#10b981" opacity="0.06" filter="blur(75px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <!-- Active Learning Hub button -->
    <rect x="475" y="21" width="110" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="490" y="38" fill="#10b981">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Title & Description -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Codezen Syllabus &amp; Learning Hub</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Master production-ready stacks with structured interactive coursework labs and assignments.</text>

  <!-- Top filters tab bar -->
  <rect x="80" y="185" width="280" height="36" rx="8" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <text x="95" y="208" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">TRACK_FILTER // ALL_COURSES</text>
  
  <text x="380" y="208" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="500">Frontend</text>
  <text x="460" y="208" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="500">Backend</text>
  <text x="540" y="208" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="500">Systems</text>

  <!-- Active course cards grid -->

  <!-- COURSE CARD 1 -->
  <rect x="80" y="245" width="350" height="200" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <!-- Card Header banner -->
  <path d="M 80,261 A 16,16 0 0,1 96,245 L 414,245 A 16,16 0 0,1 430,261 L 430,285 L 80,285 Z" fill="#312e81" />
  <text x="100" y="268" fill="#818cf8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">MODULE_1 // WEB_ENGINEERING</text>
  
  <text x="100" y="315" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">TypeScript Core Foundations</text>
  <text x="100" y="340" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Strict mode types, generics, type assertion, interfaces, and decorators.</text>
  
  <rect x="100" y="375" width="120" height="26" rx="6" fill="#10b981" opacity="0.15" />
  <text x="112" y="392" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">• active_study</text>
  <text x="310" y="392" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="600">50 XP award</text>

  <!-- COURSE CARD 2 -->
  <rect x="465" y="245" width="350" height="200" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <!-- Card Header banner -->
  <path d="M 465,261 A 16,16 0 0,1 481,245 L 799,245 A 16,16 0 0,1 815,261 L 815,285 L 465,285 Z" fill="#064e3b" />
  <text x="485" y="268" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">MODULE_2 // COMPOSE_LOGIC</text>
  
  <text x="485" y="315" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Mastering React Hooks &amp; State</text>
  <text x="485" y="340" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Declarative rendering models, cleanup hooks, and advanced custom state logic.</text>
  
  <rect x="485" y="375" width="115" height="26" rx="6" fill="#0ea5e9" opacity="0.15" />
  <text x="495" y="392" fill="#0ea5e9" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">Enrolled_292</text>
  <text x="690" y="392" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="600">80 XP award</text>

  <!-- COURSE CARD 3 -->
  <rect x="850" y="245" width="350" height="200" rx="16" fill="#020617" stroke="#374151" stroke-width="1" />
  <!-- Card Header banner -->
  <path d="M 850,261 A 16,16 0 0,1 866,245 L 1184,245 A 16,16 0 0,1 1200,261 L 1200,285 L 850,285 Z" fill="#111827" />
  <text x="870" y="268" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">MODULE_3 // SERVER_NETWORKING</text>
  
  <text x="870" y="315" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="bold">Express + Node Server Craft</text>
  <text x="870" y="340" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Asynchronous request flow, middleware routing stacks, and API security headers.</text>
  
  <rect x="870" y="375" width="115" height="26" rx="6" fill="#64748b" opacity="0.15" />
  <text x="880" y="392" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">Locked_Req_Lvl3</text>
  <text x="1070" y="392" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="600">120 XP award</text>

  <!-- Bottom Interactive Playground Console -->
  <rect x="80" y="475" width="1120" height="190" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <rect x="81" y="476" width="1118" height="34" rx="15" fill="#0c1524" />
  <text x="100" y="498" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">ACTIVE_CURRICULUM_TIMELINE // REAL-TIME XP ROADMAP</text>
  
  <line x1="150" y1="570" x2="1110" y2="570" stroke="#1e293b" stroke-width="4" stroke-dasharray="8 8" />
  
  <!-- Step Circles -->
  <!-- Step 1 Complete -->
  <circle cx="200" cy="570" r="14" fill="#10b981" />
  <circle cx="200" cy="570" r="8" fill="#020617" />
  <text x="200" y="605" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="600">Onboarding</text>
  <text x="200" y="620" text-anchor="middle" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">COMPLETED</text>

  <!-- Step 2 Active -->
  <line x1="200" y1="570" x2="500" y2="570" stroke="#10b981" stroke-width="3" />
  <circle cx="500" cy="570" r="14" fill="#10b981" />
  <circle cx="500" cy="570" r="8" fill="#10b981" />
  <text x="500" y="605" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="600">TypeScript Drill</text>
  <text x="500" y="620" text-anchor="middle" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">ACTIVE_STUDY</text>

  <!-- Step 3 Incomplete -->
  <circle cx="800" cy="570" r="12" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="800" y="605" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="500">React Mastery</text>
  <text x="800" y="620" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">PENDING</text>

  <!-- Step 4 Locked -->
  <circle cx="1100" cy="570" r="12" fill="#0b1329" stroke="#334155" stroke-width="2" />
  <text x="1100" y="605" text-anchor="middle" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="500">Express Architect</text>
  <text x="1100" y="620" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">LOCKED</text>

</svg>
