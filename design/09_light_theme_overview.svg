<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Light Theme Slate Background -->
  <rect width="1280" height="720" fill="#f8fafc" />
  
  <!-- Subtle light gray grid lines -->
  <g opacity="0.15" stroke="#64748b" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
  </g>

  <!-- Glowing bright background blobs (soft ambient hues for light mode) -->
  <circle cx="200" cy="200" r="180" fill="#34d399" opacity="0.06" filter="blur(60px)" />
  <circle cx="1080" cy="500" r="220" fill="#818cf8" opacity="0.06" filter="blur(80px)" />

  <!-- Navigation Bar Mockup (Light Slate style) -->
  <rect x="0" y="0" width="1280" height="70" fill="#ffffff" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#e2e8f0" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#059669" opacity="0.1" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#059669" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#059669" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  
  <text x="90" y="34" fill="#0f172a" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#059669" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <rect x="365" y="21" width="95" height="28" rx="8" fill="#059669" opacity="0.1" />
    <text x="380" y="38" fill="#047857">Home_Page</text>
    
    <text x="485" y="38" fill="#475569">Learning_Hub</text>
    <text x="595" y="38" fill="#475569">Gatherings</text>
    <text x="695" y="38" fill="#475569">Verifier</text>
    <text x="785" y="38" fill="#475569">Dashboard</text>
    <text x="875" y="38" fill="#475569">Quests</text>
  </g>

  <!-- Theme Toggle Selector Indicator -->
  <g transform="translate(1210, 20)">
    <circle cx="15" cy="15" r="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <!-- Sun icon -->
    <circle cx="15" cy="15" r="5" fill="#eab308" />
    <line x1="15" y1="5" x2="15" y2="8" stroke="#eab308" stroke-width="1.5" />
    <line x1="15" y1="22" x2="15" y2="25" stroke="#eab308" stroke-width="1.5" />
    <line x1="5" y1="15" x2="8" y2="15" stroke="#eab308" stroke-width="1.5" />
    <line x1="22" y1="15" x2="25" y2="15" stroke="#eab308" stroke-width="1.5" />
  </g>

  <!-- MAIN COVER HERO -->
  <text x="640" y="145" text-anchor="middle" fill="#0f172a" font-family="'Inter', sans-serif" font-size="44" font-weight="900" letter-spacing="-1">Clean &amp; Accessible Web Environments</text>
  <text x="640" y="175" text-anchor="middle" fill="#475569" font-family="'Inter', sans-serif" font-size="15" font-weight="400">Readably structured for high contrast, day-view workspace compliance.</text>

  <!-- Stat Grid Items (3 Col Cards) -->
  <!-- Stats Card 1 -->
  <rect x="80" y="210" width="350" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="110" y="255" fill="#059669" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">450+</text>
  <text x="110" y="280" fill="#0f172a" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">HACKERS ACTIVE</text>
  <text x="110" y="295" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Daily synchronous terminal registrations.</text>

  <!-- Stats Card 2 -->
  <rect x="465" y="210" width="350" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="495" y="255" fill="#4f46e5" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">12,480</text>
  <text x="495" y="280" fill="#0f172a" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">REPUTATION XP</text>
  <text x="495" y="295" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Locked and loaded in the learning database.</text>

  <!-- Stats Card 3 -->
  <rect x="850" y="210" width="350" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="880" y="255" fill="#0284c7" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">98.4%</text>
  <text x="880" y="280" fill="#0f172a" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">TICKET INTEGRITY</text>
  <text x="880" y="295" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Cryptographically signed credentials.</text>

  <!-- Light Theme Form Box Showcase (Shows the customized Admin credentials overrides styled for light theme) -->
  <rect x="80" y="350" width="1120" height="310" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  
  <rect x="81" y="351" width="1118" height="40" rx="15" fill="#f1f5f9" />
  <text x="110" y="376" fill="#0f172a" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">DEMONSTRATION: LIGHT THEME OVERRIDES FOR INPUT FORM FIELDS</text>
  <line x1="80" y1="391" x2="1200" y2="391" stroke="#e2e8f0" stroke-width="1" />

  <!-- Form elements preview -->
  <text x="110" y="440" fill="#334155" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">INPUT_FIELD_MOCK_STATE</text>
  <rect x="110" y="452" width="400" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" />
  <text x="125" y="476" fill="#0f172a" font-family="'Inter', sans-serif" font-size="13">Garg Gourav</text>

  <text x="560" y="440" fill="#334155" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">FORM_INPUT_PLACEHOLDER</text>
  <rect x="560" y="452" width="400" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="575" y="476" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">Enter access code here...</text>

  <!-- Theme custom overrides button styles -->
  <text x="110" y="535" fill="#334155" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold">ACCESSIBLE_QUICK_ACCREDITATION_BUTTONS</text>
  
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">
    <!-- Super -->
    <rect x="110" y="555" width="200" height="34" rx="8" fill="#eef2ff" stroke="#818cf8" stroke-width="1" />
    <text x="210" y="577" text-anchor="middle" fill="#4f46e5">Gourav (Super Admin)</text>
    
    <!-- Lvl 1 -->
    <rect x="330" y="555" width="200" height="34" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="1" />
    <text x="430" y="577" text-anchor="middle" fill="#059669">gourav (Level 1 Admin)</text>

    <!-- Mem -->
    <rect x="550" y="555" width="200" height="34" rx="8" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" />
    <text x="650" y="577" text-anchor="middle" fill="#d97706">gourav1 (Standard Member)</text>
  </g>
</svg>
