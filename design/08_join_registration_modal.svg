<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="640" cy="360" r="280" fill="#10b981" opacity="0.04" filter="blur(90px)" />

  <!-- Navigation Bar Mockup (Blurred Under modal) -->
  <g opacity="0.25">
    <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
    <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
    <text x="380" y="38" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">Home_Page</text>
    <text x="490" y="38" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">Learning_Hub</text>
  </g>

  <!-- Semi-Transparent Dark Backdrop Filter -->
  <rect width="1280" height="720" fill="#020617" opacity="0.7" />

  <!-- CENTRAL MODAL DIALOG CONTAINER -->
  <rect x="360" y="100" width="560" height="520" rx="20" fill="#050b14" stroke="#10b981" stroke-width="2" />
  
  <!-- Modal header -->
  <path d="M 360,120 A 20,20 0 0,1 380,100 L 900,100 A 20,20 0 0,1 920,120 L 920,154 L 360,154 Z" fill="#0c1524" />
  <text x="390" y="134" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">ONBOARDING_MODAL // LEVEL_0_INITIALIZATION</text>
  
  <!-- Close Button X -->
  <circle cx="890" cy="127" r="12" fill="#1e293b" />
  <text x="886" y="131" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">×</text>

  <!-- Title Description -->
  <text x="640" y="195" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Register Hacker Profile</text>
  <text x="640" y="218" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13">Provide your credentials to register in Codezen's decentralized campus ledger.</text>

  <!-- Registration Form Fields -->
  <!-- Input 1: Full Name -->
  <text x="400" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">HACKER_NAME *</text>
  <rect x="400" y="272" width="480" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
  <text x="415" y="296" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="500">Garg Gourav</text>

  <!-- Input 2: GitHub Custom Handle -->
  <text x="400" y="340" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">GITHUB_USERNAME *</text>
  <rect x="400" y="352" width="480" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
  <text x="415" y="376" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="13">garggourav647</text>

  <!-- Input 3: Developer Stack Selector -->
  <text x="400" y="420" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">PRIMARY_TECHNOLOGY_ROLE</text>
  <rect x="400" y="432" width="480" height="40" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
  <text x="415" y="456" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="500">Full Stack Web Engineering (React / TS / Express)</text>
  <!-- Select arrow indicator -->
  <polygon points="855,448 860,455 865,448" fill="#10b981" />

  <!-- Checkbox terms -->
  <rect x="400" y="495" width="16" height="16" rx="4" fill="#10b981" />
  <!-- Checkmark icon -->
  <path d="M 403,503 L 406,506 L 413,499" stroke="#ffffff" stroke-width="2" fill="none" />
  <text x="428" y="508" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="12">I agree to commit verified codes and respect sandbox rules.</text>

  <!-- Action Trigger Buttons -->
  <rect x="400" y="540" width="480" height="44" rx="12" fill="#10b981" />
  <text x="640" y="567" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">CONJECT_REGISTRY_LEDGER</text>

</svg>
