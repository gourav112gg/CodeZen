<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="400" x2="1280" y2="400" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="0" y1="560" x2="1280" y2="560" />
    <line x1="0" y1="640" x2="1280" y2="640" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
    <line x1="480" y1="0" x2="480" y2="720" />
    <line x1="640" y1="0" x2="640" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
    <line x1="960" y1="0" x2="960" y2="720" />
    <line x1="1120" y1="0" x2="1120" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="200" r="180" fill="#10b981" opacity="0.08" filter="blur(60px)" />
  <circle cx="1080" cy="500" r="220" fill="#6366f1" opacity="0.08" filter="blur(80px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <!-- Active landing button -->
    <rect x="365" y="21" width="95" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="380" y="38" fill="#10b981">Home_Page</text>
    
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <text x="875" y="38" fill="#94a3b8">Quests</text>
  </g>

  <!-- Profile badge light level metrics -->
  <rect x="990" y="15" width="250" height="40" rx="12" fill="#020617" stroke="#10b981" stroke-width="1" opacity="0.8" />
  <circle cx="1015" cy="35" r="14" fill="#1e293b" />
  <!-- Mini avatar graphic -->
  <rect x="1007" y="27" width="16" height="16" fill="#10b981" rx="2" />
  <rect x="1011" y="31" width="8" height="4" fill="#ffffff" />
  <text x="1040" y="31" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">Garg Gourav</text>
  <text x="1040" y="45" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700">LVL 1 • 180 XP</text>

  <!-- MAIN COVER HERO -->
  <text x="640" y="145" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="44" font-weight="900" letter-spacing="-1">The Sandbox for Student Craftsmanship</text>
  <text x="640" y="175" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="15" font-weight="400">Join the elite guild of campus hackers, software creators, and open-source architects.</text>

  <!-- Stat Grid Items (3 Bento Box columns) -->
  <!-- Stats Card 1 -->
  <rect x="80" y="210" width="350" height="110" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="110" y="255" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">450+</text>
  <text x="110" y="280" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">HACKERS ACTIVE</text>
  <text x="110" y="295" fill="#64748b" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Daily synchronous terminal registrations.</text>

  <!-- Stats Card 2 -->
  <rect x="465" y="210" width="350" height="110" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="495" y="255" fill="#6366f1" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">12,480</text>
  <text x="495" y="280" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">REPUTATION XP</text>
  <text x="495" y="295" fill="#64748b" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Locked and loaded in the learning database.</text>

  <!-- Stats Card 3 -->
  <rect x="850" y="210" width="350" height="110" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <text x="880" y="255" fill="#0ea5e9" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold">98.4%</text>
  <text x="880" y="280" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold">TICKET INTEGRITY</text>
  <text x="880" y="295" fill="#64748b" font-family="'Inter', sans-serif" font-size="11" font-weight="400">Cryptographically signed credentials.</text>

  <!-- Live Mainframe Terminal Container Box -->
  <rect x="80" y="350" width="1120" height="310" rx="16" fill="#050b14" stroke="#10b981" stroke-width="1.5" opacity="0.95" />
  
  <!-- Terminal Header -->
  <rect x="81" y="351" width="1118" height="40" rx="15" fill="#0c1524" />
  <circle cx="110" cy="371" r="6" fill="#ef4444" />
  <circle cx="130" cy="371" r="6" fill="#f59e0b" />
  <circle cx="150" cy="371" r="6" fill="#10b981" />
  <text x="640" y="376" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600">LIVE_SHELL://MAINFRAME_DAEMON-ONLINE</text>
  <line x1="80" y1="391" x2="1200" y2="391" stroke="#10b981" stroke-width="1" opacity="0.3" />

  <!-- Terminal Content Lines -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500">
    <text x="110" y="425" fill="#10b981">SYSTEM@CODEZEN_SHELL:~$ <tspan fill="#ffffff">grep -rnI "mainframe" ./src</tspan></text>
    <text x="110" y="450" fill="#64748b">Loading modular state engines...</text>
    <text x="110" y="475" fill="#e2e8f0">&gt; Authenticating credentials database: SECURE_TUNNEL_ESTABLISHED</text>
    <text x="110" y="500" fill="#22c55e">&gt; Level 1 Auth key: accepted (User: gourav)</text>
    <text x="110" y="525" fill="#a855f7">&gt; Super Admin mode: active (User: Gourav)</text>
    <text x="110" y="550" fill="#64748b">SYNC: 12 courses compiled, 5 global quests deployed to community blockchain.</text>
    <text x="110" y="575" fill="#eab308">WARNING: Direct writing is locked for level standard Member views.</text>
    <text x="110" y="615" fill="#10b981" font-weight="bold">SYSTEM@CODEZEN_SHELL:~$ <tspan fill="#64748b" font-weight="normal">listening on socket port 3000...</tspan><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" /></text>
  </g>

  <!-- Interactive Terminal Scrollbar Mockup -->
  <rect x="1180" y="410" width="6" height="210" rx="3" fill="#1e293b" opacity="0.5" />
  <rect x="1180" y="410" width="6" height="80" rx="3" fill="#10b981" opacity="0.8" />
</svg>
