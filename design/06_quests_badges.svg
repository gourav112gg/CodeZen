<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0b1329" />
  
  <!-- Subtle tech grid pattern backings -->
  <g opacity="0.05" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="160" y1="0" x2="160" y2="720" />
    <line x1="320" y1="0" x2="320" y2="720" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="500" r="160" fill="#eab308" opacity="0.06" filter="blur(70px)" />
  <circle cx="1000" cy="150" r="150" fill="#10b981" opacity="0.07" filter="blur(65px)" />

  <!-- Navigation Bar Mockup -->
  <rect x="0" y="0" width="1280" height="70" fill="#0f172a" rx="0" />
  <rect x="0" y="69" width="1280" height="1" fill="#1e293b" />
  
  <!-- Logo -->
  <rect x="40" y="16" width="38" height="38" rx="8" fill="#10b981" opacity="0.15" />
  <rect x="40" y="16" width="38" height="38" rx="8" stroke="#10b981" stroke-width="1.5" fill="none" />
  <text x="48" y="41" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="bold">&gt;_</text>
  <text x="90" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="1">CODEZEN</text>
  <text x="90" y="48" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="0.5">STUDENT DEV COMMUNITY</text>

  <!-- Nav Menu Buttons -->
  <rect x="360" y="18" width="560" height="34" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <text x="380" y="38" fill="#94a3b8">Home_Page</text>
    <text x="485" y="38" fill="#94a3b8">Learning_Hub</text>
    <text x="595" y="38" fill="#94a3b8">Gatherings</text>
    <text x="695" y="38" fill="#94a3b8">Verifier</text>
    <text x="785" y="38" fill="#94a3b8">Dashboard</text>
    <!-- Active Quests/Achievements button -->
    <rect x="860" y="21" width="55" height="28" rx="8" fill="#10b981" opacity="0.1" />
    <text x="872" y="38" fill="#10b981">Quests</text>
  </g>

  <!-- Header Info Section -->
  <text x="80" y="130" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800">Quests &amp; Milestone Showcase</text>
  <text x="80" y="155" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="400">Track and unlock legendary student achievements with cryptography-proof badges automatically synced to your developer profile.</text>

  <!-- 4-GRID BADGES SHOWCASE -->
  
  <!-- BADGE 1: UNLOCKED -->
  <rect x="80" y="195" width="260" height="435" rx="16" fill="#020617" stroke="#22c55e" stroke-width="1.5" />
  <rect x="95" y="210" width="80" height="26" rx="6" fill="#22c55e" opacity="0.1" />
  <text x="110" y="227" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">UNLOCKED</text>

  <!-- Badge Emblem Graphic -->
  <circle cx="210" cy="315" r="45" fill="#22c55e" opacity="0.1" />
  <circle cx="210" cy="315" r="35" stroke="#22c55e" stroke-width="2.5" fill="none" />
  <text x="210" y="322" text-anchor="middle" fill="#22c55e" font-family="'Inter', sans-serif" font-size="22" font-weight="bold">👋</text>

  <text x="210" y="405" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="bold">Hello Codezen Builder</text>
  
  <text x="100" y="445" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13" font-weight="400" width="220">
    <tspan x="210" text-anchor="middle" dy="0">Successfully joined</tspan>
    <tspan x="210" text-anchor="middle" dy="18">our student developer</tspan>
    <tspan x="210" text-anchor="middle" dy="18">portal mainframe.</tspan>
  </text>
  <text x="210" y="585" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">+100 Reputation XP</text>

  <!-- BADGE 2: UNLOCKED -->
  <rect x="365" y="195" width="260" height="435" rx="16" fill="#020617" stroke="#22c55e" stroke-width="1.5" />
  <rect x="380" y="210" width="80" height="26" rx="6" fill="#22c55e" opacity="0.1" />
  <text x="395" y="227" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">UNLOCKED</text>

  <!-- Badge Emblem Graphic -->
  <circle cx="495" cy="315" r="45" fill="#3b82f6" opacity="0.1" />
  <circle cx="495" cy="315" r="35" stroke="#3b82f6" stroke-width="2.5" fill="none" />
  <text x="495" y="322" text-anchor="middle" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="22" font-weight="bold">❤️</text>

  <text x="495" y="405" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="bold">Open Source Supporter</text>
  
  <text x="385" y="445" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">
    <tspan x="495" text-anchor="middle" dy="0">Contributed codebase</tspan>
    <tspan x="495" text-anchor="middle" dy="18">files, synced modules,</tspan>
    <tspan x="495" text-anchor="middle" dy="18">and helped neighbors.</tspan>
  </text>
  <text x="495" y="585" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">+80 Reputation XP</text>

  <!-- BADGE 3: LOCKED -->
  <rect x="650" y="195" width="260" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <rect x="665" y="210" width="70" height="26" rx="6" fill="#ef4444" opacity="0.1" />
  <text x="682" y="227" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">LOCKED</text>

  <!-- Badge Emblem Graphic -->
  <circle cx="780" cy="315" r="45" fill="#f59e0b" opacity="0.05" />
  <circle cx="780" cy="315" r="35" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <text x="780" y="322" text-anchor="middle" fill="#475569" font-family="'Inter', sans-serif" font-size="22" font-weight="bold">🎓</text>

  <text x="780" y="405" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="16" font-weight="bold">Scholar Status</text>
  
  <text x="670" y="445" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="400">
    <tspan x="780" text-anchor="middle" dy="0">Complete 3 unique</tspan>
    <tspan x="780" text-anchor="middle" dy="18">Syllabus micro-courses</tspan>
    <tspan x="780" text-anchor="middle" dy="18">inside Learning Hub.</tspan>
  </text>
  <text x="780" y="585" text-anchor="middle" fill="#334155" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">+200 Reputation XP</text>

  <!-- BADGE 4: LOCKED -->
  <rect x="935" y="195" width="260" height="435" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <rect x="950" y="210" width="70" height="26" rx="6" fill="#ef4444" opacity="0.1" />
  <text x="967" y="227" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">LOCKED</text>

  <!-- Badge Emblem Graphic -->
  <circle cx="1065" cy="315" r="45" fill="#a855f7" opacity="0.05" />
  <circle cx="1065" cy="315" r="35" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <text x="1065" y="322" text-anchor="middle" fill="#475569" font-family="'Inter', sans-serif" font-size="22" font-weight="bold">💻</text>

  <text x="1065" y="405" text-anchor="middle" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="16" font-weight="bold">First Commit</text>
  
  <text x="1055" y="445" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="400">
    <tspan x="1065" text-anchor="middle" dy="0">Push first change in</tspan>
    <tspan x="1065" text-anchor="middle" dy="18">community Git roster</tspan>
    <tspan x="1065" text-anchor="middle" dy="18">auth logs system.</tspan>
  </text>
  <text x="1065" y="585" text-anchor="middle" fill="#334155" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">+150 Reputation XP</text>

</svg>
